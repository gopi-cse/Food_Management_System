{% extends "base.html" %}
{% block content %}
<div class="content-panel">
    <h2>Delete Food</h2>
    <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
    <form method="post">{% csrf_token %}<button class="btn btn-danger">Delete</button><a class="btn btn-secondary" href="{% url 'foods:list' %}">Cancel</a></form>
</div>
{% endblock %}
