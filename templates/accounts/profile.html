{% extends "base.html" %}
{% block title %}Profile | Food Management System{% endblock %}
{% block content %}
<div class="page-header">
    <h1>User Profile</h1>
    <p>Update your account details and keep your profile information accurate.</p>
</div>
<div class="content-panel">
    <form method="post" novalidate>
        {% csrf_token %}
        {% include "includes/form_fields.html" %}
        <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-success" type="submit">Save Profile</button>
            <a class="btn btn-outline-secondary" href="{% url 'accounts:change_password' %}">Change Password</a>
        </div>
    </form>
</div>
{% endblock %}
