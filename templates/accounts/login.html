{% extends "base.html" %}
{% block title %}Login | Food Management System{% endblock %}
{% block content %}
<div class="auth-card mx-auto">
    <h2 class="mb-1">Login</h2>
    <p class="text-muted">Access your food management dashboard.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {% include "includes/form_fields.html" %}
        <button class="btn btn-success w-100" type="submit">Login</button>
    </form>
    <p class="mt-3 mb-0 text-center">New user? <a href="{% url 'accounts:register' %}">Create an account</a></p>
</div>
{% endblock %}
