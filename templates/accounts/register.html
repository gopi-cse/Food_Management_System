{% extends "base.html" %}
{% block title %}Register | Food Management System{% endblock %}
{% block content %}
<div class="auth-card mx-auto">
    <h2 class="mb-1">Create Account</h2>
    <p class="text-muted">Register to start managing foods, categories, and orders.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {% include "includes/form_fields.html" %}
        <button class="btn btn-success w-100" type="submit">Register</button>
    </form>
    <p class="mt-3 mb-0 text-center">Already registered? <a href="{% url 'accounts:login' %}">Login</a></p>
</div>
{% endblock %}
