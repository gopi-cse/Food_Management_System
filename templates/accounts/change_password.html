{% extends "base.html" %}
{% block title %}Change Password | Food Management System{% endblock %}
{% block content %}
<div class="auth-card mx-auto">
    <h2 class="mb-1">Change Password</h2>
    <p class="text-muted">Use a strong password to protect your account.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {% include "includes/form_fields.html" %}
        <button class="btn btn-success w-100" type="submit">Update Password</button>
    </form>
</div>
{% endblock %}
